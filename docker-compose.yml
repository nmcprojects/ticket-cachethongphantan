version: '3.8'

services:
  # ============================================================
  # MYSQL — 1 instance, nhiều database
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: '%'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-ppassword']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jhipster-network

  # ============================================================
  # JHIPSTER REGISTRY (Eureka + Spring Cloud Config)
  # ============================================================
  # jhipster-registry:
  #   image: eclipse-temurin:17-jre
  #   container_name: jhipster-registry
  #   ports:
  #     - '8761:8761'
  #   command: java -jar /app/app.jar
  #   volumes:
  #     - ./jhipster-registry/target/jhipster-registry-7.5.0.jar:/app/app.jar
  #   healthcheck:
  #     test: ['CMD', 'curl', '-f', 'http://localhost:8761/management/health']
  #     interval: 15s
  #     timeout: 5s
  #     retries: 10
  #   networks:
  #     - jhipster-network
  jhipster-registry:
    image: jhipster/jhipster-registry:v7.5.0
    container_name: jhipster-registry
    ports:
      - '8761:8761'
    volumes:
      - ./jhipster-registry/central-config:/central-config
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=dev,api-docs
      - SPRING_SECURITY_USER_PASSWORD=admin
      - JHIPSTER_REGISTRY_PASSWORD=admin
      - SPRING_CLOUD_CONFIG_SERVER_COMPOSITE_0_TYPE=native
      - SPRING_CLOUD_CONFIG_SERVER_COMPOSITE_0_SEARCH_LOCATIONS=file:./central-config
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8761/management/health']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - jhipster-network

  # ============================================================
  # GATEWAY (port 9000)
  # ============================================================
  gateway:
    container_name: gateway
    image: eclipse-temurin:17-jre
    working_dir: /app
    volumes:
      - ./be-services/gateway/target/gateway-0.0.1-SNAPSHOT.jar:/app/app.jar
    ports:
      - '9000:9000'
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=dev,api-docs
      - SPRING_CLOUD_CONFIG_ENABLED=false
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin@jhipster-registry:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://admin:admin@jhipster-registry:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/gateway?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_R2DBC_URL=r2dbc:mysql://mysql:3306/gateway?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - SPRING_R2DBC_USERNAME=root
      - SPRING_R2DBC_PASSWORD=password
      - SPRING_LIQUIBASE_URL=jdbc:mysql://mysql:3306/gateway?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET=Y2UwMmU4MjZjZTQ2MDljZTA5ZTI2NGYwMGZiMjY0YmVmZTk3OGUwYTA1NjBjYjA1NmU5NzE4OWUzYmYwMDhmNWYzMGRmNzVjYzFlM2M0NDAyYjM2MmY1OWQxNjkyYTRlOTMzYTFiNmI1ZmFjYzYwZjQ3OTExZDdjZDgwZDY4NDc=
    command: java -jar /app/app.jar
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      jhipster-registry:
        condition: service_healthy
    networks:
      - jhipster-network
 
